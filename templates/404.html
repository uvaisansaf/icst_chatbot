<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Page Not Found – ICST University">
    <meta name="theme-color" content="#001833">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/images/ICST-Logo-Final@4x-1.png"/>
    <title>404 — Page Not Found · ICST University</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy:      #001833;
            --navy-mid:  #002b5c;
            --gold:      #c9a03d;
            --gold-lt:   #e4c870;
            --offwhite:  #f5f0e8;
        }

        html, body { height: 100%; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--navy);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
            color: var(--offwhite);
        }

        /* Layered background art */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(201,160,61,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,160,61,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .bg-glow-1 {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(201,160,61,0.09) 0%, transparent 65%);
            top: -200px; right: -100px;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,56,120,0.5) 0%, transparent 65%);
            bottom: -150px; left: -100px;
            pointer-events: none;
        }

        /* Giant ghost number */
        .ghost-number {
            position: absolute;
            font-family: 'Syne', sans-serif;
            font-size: clamp(220px, 30vw, 380px);
            font-weight: 800;
            color: transparent;
            -webkit-text-stroke: 1px rgba(201,160,61,0.08);
            letter-spacing: -20px;
            line-height: 1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
        }

        /* Main card */
        .card {
            position: relative;
            max-width: 540px;
            width: 100%;
            z-index: 10;
            animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes rise {
            from { opacity:0; transform: translateY(32px); }
            to   { opacity:1; transform: translateY(0); }
        }

        /* Gold accent bar */
        .accent-bar {
            height: 3px;
            background: linear-gradient(90deg, transparent 0%, var(--gold) 30%, var(--gold-lt) 60%, transparent 100%);
            border-radius: 99px;
            margin-bottom: 40px;
            animation: bar-in 1s cubic-bezier(0.22,1,0.36,1) 0.2s both;
            transform-origin: left;
        }

        @keyframes bar-in {
            from { transform: scaleX(0); opacity: 0; }
            to   { transform: scaleX(1); opacity: 1; }
        }

        .error-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(201,160,61,0.12);
            border: 1px solid rgba(201,160,61,0.3);
            border-radius: 999px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold-lt);
            margin-bottom: 24px;
        }

        .error-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 8px var(--gold);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 3.25rem);
            font-weight: 800;
            line-height: 1.05;
            color: var(--offwhite);
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        h1 span {
            color: var(--gold);
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(245,240,232,0.55);
            line-height: 1.65;
            max-width: 400px;
            margin-bottom: 40px;
        }

        /* Search */
        .search-wrap {
            position: relative;
            margin-bottom: 24px;
        }

        .search-wrap input {
            width: 100%;
            padding: 16px 140px 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--offwhite);
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .search-wrap input::placeholder { color: rgba(245,240,232,0.3); }

        .search-wrap input:focus {
            border-color: rgba(201,160,61,0.5);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 3px rgba(201,160,61,0.08);
        }

        .search-wrap button {
            position: absolute;
            right: 6px; top: 6px; bottom: 6px;
            background: linear-gradient(135deg, var(--gold) 0%, #a07d28 100%);
            border: none;
            padding: 0 22px;
            border-radius: 10px;
            color: var(--navy);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            letter-spacing: 0.3px;
        }

        .search-wrap button:hover { opacity: 0.88; transform: scale(0.97); }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold) 0%, #a07d28 100%);
            color: var(--navy);
            box-shadow: 0 4px 20px rgba(201,160,61,0.25);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,160,61,0.35); }

        .btn-ghost {
            background: rgba(255,255,255,0.06);
            color: rgba(245,240,232,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--offwhite); }

        /* Quick links */
        .quick-links {
            border-top: 1px solid rgba(255,255,255,0.07);
            padding-top: 28px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .quick-links a {
            color: rgba(245,240,232,0.4);
            text-decoration: none;
            font-size: 13px;
            padding: 5px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .quick-links a:hover {
            color: var(--gold-lt);
            background: rgba(201,160,61,0.08);
            border-color: rgba(201,160,61,0.2);
        }

        .dot { color: rgba(255,255,255,0.15); font-size: 10px; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    <div class="ghost-number" aria-hidden="true">404</div>

    <div class="card">
        <div class="accent-bar"></div>

        <div class="error-badge">Error 404</div>

        <h1>This page<br>doesn't <span>exist.</span></h1>
        <p class="subtitle">The URL you followed may be broken, or the page has been moved. Try searching or head back home.</p>

        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="Search courses, admissions, help…" autocomplete="off">
            <button onclick="searchSite()">Search →</button>
        </div>

        <div class="btn-row">
            <a href="/" class="btn btn-primary">🏠 Go Home</a>
            <a href="javascript:history.back()" class="btn btn-ghost">← Go Back</a>
        </div>

        <div class="quick-links">
            <a href="/">💬 Chat</a>
            <span class="dot">◆</span>
            <a href="/voice">🎙 Voice</a>
            <span class="dot">◆</span>
            <a href="/admin/login">🔐 Admin</a>
            <span class="dot">◆</span>
            <a href="/health">❤ Status</a>
        </div>
    </div>

    <script>
        function searchSite() {
            const q = document.getElementById('searchInput').value.trim();
            if (q) window.location.href = '/?message=' + encodeURIComponent(q);
        }
        document.getElementById('searchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') searchSite();
        });
        document.getElementById('searchInput').focus();
    </script>
</body>
</html>
